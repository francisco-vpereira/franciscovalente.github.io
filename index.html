<!DOCTYPE html>
<html lang="pt">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Francisco Valente</title>

      <style>
          /* Remove margens padrão e garante altura total */
          body, html {
              margin: 0;
              padding: 0;
              height: 100%;
              width: 100%;
              font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
              overflow: hidden; /* Evita scrolls desnecessários */
          }

          /* O segredo do gradiente com inclinação e paragem brusca */
          .background {
              height: 100vh;
              width: 100vw;
              display: flex;
              align-items: center;
              justify-content: center;
              background: linear-gradient(
                  65deg, 
                  #ffffff 0%, 
                  #ffffff 45%, 
                  #000000 45%, 
                  #000000 100%
              );
          }

          /* Estilo da frase */
          .text-container {
              text-align: center;
              z-index: 1;
          }

          h1 {
              font-size: 3rem;
              letter-spacing: 2px;
              text-transform: uppercase;
              /* Efeito de cor invertida: branco no fundo preto, preto no fundo branco */
              /* background: linear-gradient(75deg, #000 35%, #fff 45%); */
              color: rgb(129, 129, 129);
              font-weight: 900;
          }

          /* Responsividade para telemóveis */
          @media (max-width: 600px) {
              h1 { font-size: 1.5rem; }
          }
      </style>
  </head>
  <body>

      <div class="background">
          <div class="text-container">
              <h1>Website coming soon</h1>
          </div>
      </div>


  <!-- JS externo -->
  <!-- <script src="artigos.js"></script> -->
  <script data-goatcounter="https://francisco2.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>

</body>
</html>
